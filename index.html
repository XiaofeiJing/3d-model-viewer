<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 卡通模型查看器</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a2e;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      --poster-color: transparent;
    }

    /* 主标题 Power */
    .main-title {
      position: fixed;
      top: 8%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      font-family: "Arial Black", "Arial Bold", "Helvetica Neue", Arial, sans-serif;
      font-size: 96px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 16px;
      text-transform: uppercase;
      text-shadow:
        0 1px 0 #ccc,
        0 2px 0 #c9c9c9,
        0 3px 0 #bbb,
        0 4px 0 #b9b9b9,
        0 5px 0 #aaa,
        0 6px 1px rgba(0,0,0,0.1),
        0 0 5px rgba(0,0,0,0.1),
        0 1px 3px rgba(0,0,0,0.3),
        0 3px 5px rgba(0,0,0,0.2),
        0 5px 10px rgba(0,0,0,0.25),
        0 10px 10px rgba(0,0,0,0.2),
        0 20px 20px rgba(0,0,0,0.15);
      pointer-events: none;
      user-select: none;
      animation: titleFloat 3s ease-in-out infinite;
    }

    @keyframes titleFloat {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-8px); }
    }

    /* 顶部标题栏 */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: linear-gradient(180deg, rgba(26,26,46,0.92) 0%, rgba(26,26,46,0) 100%);
      pointer-events: none;
    }

    .header-title {
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .header-badge {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    /* 底部控制栏 */
    .controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 18px 24px;
      background: linear-gradient(0deg, rgba(26,26,46,0.92) 0%, rgba(26,26,46,0) 100%);
    }

    .ctrl-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(10px);
      user-select: none;
    }

    .ctrl-btn:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-1px);
    }

    .ctrl-btn:active {
      transform: translateY(0);
    }

    .ctrl-btn.active {
      background: rgba(99,140,255,0.3);
      border-color: rgba(99,140,255,0.6);
      color: #a0bbff;
    }

    .ctrl-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* 右侧信息面板 */
    .info-panel {
      position: fixed;
      top: 60px;
      right: 20px;
      z-index: 100;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 16px;
      backdrop-filter: blur(16px);
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      line-height: 1.8;
      min-width: 160px;
    }

    .info-panel .label {
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .info-panel .value {
      color: rgba(255,255,255,0.9);
      font-weight: 500;
    }

    /* 加载动画 */
    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      transition: opacity 0.8s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #638cff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      margin-top: 16px;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }

    .loading-progress {
      margin-top: 12px;
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #638cff, #a0bbff);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .error-msg {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      background: rgba(220,53,69,0.9);
      color: #fff;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      max-width: 320px;
      backdrop-filter: blur(10px);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 提示气泡 */
    .hint {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 90;
      background: rgba(0,0,0,0.55);
      color: rgba(255,255,255,0.8);
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      backdrop-filter: blur(8px);
      animation: hintFade 4s ease forwards;
      pointer-events: none;
    }

    @keyframes hintFade {
      0%, 60% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- 主标题 -->
  <div class="main-title">Power</div>

  <!-- 加载遮罩 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">正在加载 3D 模型...</div>
    <div class="loading-progress"><div class="loading-bar" id="loadingBar"></div></div>
  </div>

  <!-- 3D 模型 - 使用 jsdelivr CDN 加速 -->
  <model-viewer
    id="modelViewer"
    src="https://cdn.jsdelivr.net/gh/XiaofeiJing/3d-model-viewer@main/model.glb"
    camera-controls
    auto-rotate
    rotation-per-second="20deg"
    shadow-intensity="1"
    shadow-softness="0.8"
    exposure="1.1"
    environment-image="neutral"
    camera-orbit="0deg 75deg 1.8m"
    min-camera-orbit="auto auto 0.8m"
    max-camera-orbit="auto auto 4m"
    interpolation-decay="200"
    reveal="auto"
  ></model-viewer>

  <!-- 顶部标题 -->
  <div class="header">
    <div class="header-title">3D 卡通模型</div>
    <div class="header-badge">GLB · 交互查看</div>
  </div>

  <!-- 右侧信息 -->
  <div class="info-panel">
    <div class="label">格式</div>
    <div class="value">GLB + PBR</div>
    <div class="label" style="margin-top:8px">交互</div>
    <div class="value">拖拽旋转 / 滚轮缩放</div>
    <div class="label" style="margin-top:8px">光影</div>
    <div class="value">实时阴影</div>
  </div>

  <!-- 底部控制 -->
  <div class="controls">
    <button class="ctrl-btn active" id="btnAutoRotate" onclick="toggleAutoRotate()">
      <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
      自动旋转
    </button>
    <button class="ctrl-btn" onclick="resetCamera()">
      <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      重置视角
    </button>
    <button class="ctrl-btn" id="btnWireframe" onclick="toggleWireframe()">
      <svg viewBox="0 0 24 24"><path d="M21 3H3v18h18V3zm-2 16H5V5h14v14zM7 7h4v4H7zm6 0h4v4h-4zm-6 6h4v4H7zm6 0h4v4h-4z"/></svg>
      线框模式
    </button>
  </div>

  <!-- 操作提示 -->
  <div class="hint">🖱️ 左键拖拽旋转 · 滚轮缩放 · 右键平移</div>

  <script>
    const viewer = document.getElementById('modelViewer');
    const overlay = document.getElementById('loadingOverlay');
    const loadingText = document.getElementById('loadingText');
    const loadingBar = document.getElementById('loadingBar');
    const btnAutoRotate = document.getElementById('btnAutoRotate');
    const btnWireframe = document.getElementById('btnWireframe');
    let wireframeMode = false;
    let loadStartTime = Date.now();

    // 加载进度
    viewer.addEventListener('progress', (e) => {
      if (e.total && e.total > 0) {
        const pct = Math.round((e.loaded / e.total) * 100);
        loadingBar.style.width = pct + '%';
        const mbLoaded = (e.loaded / 1048576).toFixed(1);
        const mbTotal = (e.total / 1048576).toFixed(0);
        loadingText.textContent = `正在加载 ${mbLoaded}MB / ${mbTotal}MB (${pct}%)`;
      } else {
        // 模拟进度（当无法获取 total 时）
        const elapsed = (Date.now() - loadStartTime) / 1000;
        const estimatedPct = Math.min(90, (elapsed / 30) * 100); // 假设最多30秒
        loadingBar.style.width = estimatedPct + '%';
        const mbLoaded = ((elapsed * 1.5) | 0); // 粗略估算
        loadingText.textContent = `正在加载... 约 ${mbLoaded} MB`;
      }
    });

    // 模型加载完成
    viewer.addEventListener('load', () => {
      loadingBar.style.width = '100%';
      loadingText.textContent = '加载完成！';
      setTimeout(() => overlay.classList.add('hidden'), 500);
    });

    // 加载错误
    viewer.addEventListener('error', (err) => {
      console.error('Model load error:', err);
      loadingText.textContent = '⚠️ 模型加载失败，请检查网络后刷新页面';
      loadingBar.style.background = '#dc3545';
      // 不隐藏 loading，显示错误信息
    });

    // 自动旋转开关
    function toggleAutoRotate() {
      const isActive = viewer.getAttribute('auto-rotate') !== null;
      if (isActive) {
        viewer.removeAttribute('auto-rotate');
        btnAutoRotate.classList.remove('active');
      } else {
        viewer.setAttribute('auto-rotate', '');
        btnAutoRotate.classList.add('active');
      }
    }

    // 重置视角
    function resetCamera() {
      viewer.cameraOrbit = '0deg 75deg 1.8m';
      viewer.fieldOfView = 'auto';
    }

    // 线框模式切换
    function toggleWireframe() {
      wireframeMode = !wireframeMode;
      btnWireframe.classList.toggle('active', wireframeMode);
      const materials = viewer.model.materials;
      if (materials) {
        for (const mat of materials) {
          mat.pbrMetallicRoughness.baseColorFactor = wireframeMode
            ? [0.39, 0.55, 1, 1]
            : [1, 1, 1, 1];
          mat.pbrMetallicRoughness.metallicFactor = wireframeMode ? 0 : 0;
          mat.pbrMetallicRoughness.roughnessFactor = wireframeMode ? 1 : 1;
        }
      }
    }
  </script>
</body>
</html>
